services:
  api:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8003:8000"
    environment:
      APP_DATABASE_URL: postgresql+asyncpg://dbadmin:Password123@postgres:5432/boilerworks
      APP_REDIS_URL: redis://redis:6379/1
      APP_DEBUG: "true"
      APP_CORS_ORIGINS: '["http://localhost:3001"]'
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_ROOT: http://localhost:8003
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    ports:
      - "5436:5432"
    environment:
      POSTGRES_DB: boilerworks
      POSTGRES_USER: dbadmin
      POSTGRES_PASSWORD: Password123
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbadmin -d boilerworks"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6383:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit
    ports:
      - "8026:8025"
      - "1026:1025"
    profiles:
      - full

volumes:
  pgdata:
